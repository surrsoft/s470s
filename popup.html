<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-title">
      <h1>s470s</h1>
      <span id="sync-indicator" class="sync-indicator" title="Sync status"></span>
      <button id="sync-btn" class="icon-btn" title="Sync now">↻</button>
    </div>
    <div class="header-actions">
      <button id="theme-btn" class="icon-btn" title="Switch to dark theme">&#9790;</button>
      <button id="font-dec-btn" class="icon-btn font-btn" title="Decrease font size">A−</button>
      <button id="font-inc-btn" class="icon-btn font-btn" title="Increase font size">A+</button>
      <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
      <button id="add-btn" title="Add note">+</button>
    </div>
  </div>

  <div id="search-block" class="search-block">
    <div class="search-input-row">
      <input type="text" id="search-input" placeholder="Search...">
      <button id="search-clear" class="search-clear hidden">&#10005;</button>
    </div>
    <div class="search-options">
      <label class="search-check"><input type="checkbox" id="search-title" checked> заголовок</label>
      <label class="search-check"><input type="checkbox" id="search-desc" checked> описание</label>
      <label class="search-check"><input type="checkbox" id="search-url"> url</label>
      <label class="search-check"><input type="checkbox" id="search-case"> Aa</label>
      <select id="search-sort" class="search-sort-select">
        <option value="default">по умолч.</option>
        <option value="date">по дате</option>
      </select>
    </div>
  </div>

  <div id="nav-bar" class="nav-bar hidden">
    <button id="back-btn" class="nav-back-btn"></button>
    <div id="nav-breadcrumbs" class="nav-breadcrumbs"></div>
    <button id="reset-selected-btn" class="reset-selected-btn hidden">reset selected</button>
    <button id="delete-selected-btn" class="delete-selected-btn hidden">delete selected</button>
  </div>

  <div id="status-bar" class="status-bar hidden">
    <span id="status-text" class="status-text"></span>
    <button id="status-close" class="status-close">&#10005;</button>
  </div>

  <div id="form-container" class="form-container hidden">
    <div id="form-id-row" class="form-id-row hidden">
      <span class="form-id-label">ID</span>
      <span id="form-id-value" class="form-id-value"></span>
    </div>
    <input type="text" id="input-copy" placeholder="Text to copy">
    <input type="text" id="input-desc" placeholder="Description">
    <input type="url" id="input-url" placeholder="URL (optional)">
    <select id="input-parent"></select>
    <div class="form-symlinks">
      <label class="form-label-small">Additional parents (simlinks):</label>
      <div id="symlinks-list" class="symlinks-list"></div>
      <div class="symlink-add-row">
        <button id="btn-add-symlink" class="btn-icon" title="Add simlink" type="button">+</button>
        <select id="select-add-symlink" class="hidden">
          <option value="" disabled selected>Select note...</option>
        </select>
      </div>
    </div>
    <label class="form-check">
      <input type="checkbox" id="input-fast-copy">
      Fast copy (click copies text)
    </label>
    <div class="form-actions">
      <button id="save-btn">Save</button>
      <button id="cancel-btn" class="secondary">Cancel</button>
    </div>
  </div>

  <div id="notes-list" class="notes-list"></div>

  <div id="empty-state" class="empty-state hidden">
    <p>No notes yet</p>
    <p class="hint">Click + to create one</p>
  </div>

  <div id="toast" class="toast hidden">Copied!</div>

  <script src="lib/supabase.min.js"></script>
  <script src="sync/supabase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
